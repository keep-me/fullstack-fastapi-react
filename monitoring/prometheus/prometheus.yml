global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus:9090"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "fastapi"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
      
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx_exporter:9113"]
